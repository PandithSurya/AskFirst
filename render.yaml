services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: askfirst-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: askfirst-db
          property: connectionString

  # ── Streamlit Frontend ───────────────────────────────────────────────────
  - type: web
    name: askfirst-frontend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        sync: false

databases:
  - name: askfirst-db
    databaseName: askfirst
    user: askfirst
    plan: free
